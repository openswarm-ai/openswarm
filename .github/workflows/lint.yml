name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  structlint:
    name: Structure lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python3 linter/lint.py --root .

  typecheck:
    name: Type check (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyright

      - run: pyright --project linter/pyrightconfig.json
